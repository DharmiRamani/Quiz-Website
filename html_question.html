<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="quiz_que.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="timer.js"></script>
</head>

<body>

    <header>
        <div class="container">
            <div class="quiz-title">
                <h3><img src="./images/confuse_boy.png"> HTML Quiz</h3>
            </div>
            <div class="timer">Time Left: <span id="time">05:00</span></div>
        </div>
    </header>
    <!-- QUESTION SECTION -->
    <section class="mt-5">
        <div class="question" id="questionBox">
            <h5 id="qno">Question 1/3</h5>
            <h4 id="question"></h4>

            <div class="options" id="options"></div>

            <div class="d-flex justify-content-between mt-3">
                <button class="btn btn-prev" id="prevButton" onclick="prev()">Previous</button>
                <button class="btn btn-next" id="nextButton" onclick="next()">Next</button>
                <button class="btn btn-submit" id="submitButton" onclick="submitQuiz()">Submit</button>
            </div>
        </div>
    </section>

    <script>
        const easyQuestions = [
            { question: "HTML stands for?", options: ["Hyper Text Markup Language", "High Text Machine Language", "Hyper Tool Markup Language", "None"], answer: 0 },
            { question: "Which tag is used for paragraph?", options: ["&lt; p &gt;", "&lt; para &gt;", "&lt; text &gt;", "&lt; h1 &gt;"], answer: 0 },
            { question: "What is output? \n <h1>Hello</h1>", options: ["big heading", "small text", "error", "nothing"], answer: 0 },
            { question: "Which tag creates link?", options: ["&lt; a &gt;", "&lt; link &gt;", "&lt; href &gt;", "&lt; url &gt;"], answer: 0 },
            { question: "What is output? \n <img src='img.png'>", options: ["image", "text", "error", "link"], answer: 0 },
            { question: "Which tag is for list?", options: ["&lt; ul &gt;", "&lt; list &gt;", "&lt; li &gt;", "&lt; ol &gt;"], answer: 0 },
            { question: "What is output? \n <br>", options: ["line break", "space", "tab", "none"], answer: 0 },
            { question: "Which tag is heading?", options: ["&lt;h1&gt;", "&lt;head&gt;", "&lt;title&gt;", "&lt;p&gt;"], answer: 0 },
            { question: "What is output? \n <b>Text</b>", options: ["bold", "italic", "underline", "normal"], answer: 0 },
            { question: "Which tag is table?", options: ["&lt;table&gt;", "&lt;tab&gt;", "&lt;tr&gt;", "&lt;td&gt;"], answer: 0 }];

        const mediumQuestions = [
            { question: "Difference between &lt;div&gt; and &lt;span&gt;?", options: ["block vs inline", "same", "inline vs block", "none"], answer: 0 },
            { question: "What is output? \n &lt;ul&gt;\n &lt;li&gt;A&lt;/li&gt;\n &lt;li&gt;B&lt;/li&gt;\n &lt;/ul&gt;", options: ["list A B", "table", "text", "error"], answer: 0 },
            { question: "Which attribute for image path?", options: ["src", "href", "link", "path"], answer: 0 },
            { question: "What is output? \n &lt;a href='#'&gt;Click&lt;/a&gt;", options: ["link", "text only", "error", "button"], answer: 0 },
            { question: "Which tag is semantic?", options: ["&lt;header&gt;", "&lt;div&gt;", "&lt;span&gt;", "&lt;b&gt;"], answer: 0 },
            { question: "What is output? \n &lt;input type='text'&gt;", options: ["textbox", "button", "link", "none"], answer: 0 },
            { question: "Which tag is form?", options: ["&lt;form&gt;", "&lt;input&gt;", "&lt;label&gt;", "&lt;button&gt;"], answer: 0 },
            { question: "What is output? \n &lt;table&gt;\n &lt;tr&gt;&lt;td&gt;A&lt;/td&gt;&lt;/tr&gt;\n &lt;/table&gt;", options: ["table A", "list", "text", "none"], answer: 0 },
            { question: "Which attribute opens new tab?", options: ["target='_blank'", "new", "open", "tab"], answer: 0 },
            { question: "What is output? \n &lt;hr&gt;", options: ["line", "space", "text", "none"], answer: 0 }
        ];

        const hardQuestions = [
            { question: "What is output? \n &lt;form&gt;\n &lt;input type='checkbox'&gt;\n &lt;/form&gt;", options: ["checkbox", "text", "button", "none"], answer: 0 },
            { question: "Which is correct HTML structure?", options: ["html>head>body", "body>head>html", "head>html>body", "none"], answer: 0 },
            { question: "What is output? \n &lt;video controls&gt;\n &lt;source src='a.mp4'&gt;\n &lt;/video&gt;", options: ["video player", "audio", "image", "none"], answer: 0 },
            { question: "Which tag is SEO friendly?", options: ["&lt;article&gt;", "&lt;div&gt;", "&lt;span&gt;", "&lt;b&gt;"], answer: 0 },
            { question: "What is output? \n &lt;details&gt;\n &lt;summary&gt;Click&lt;/summary&gt;\n &lt;/details&gt;", options: ["dropdown", "text", "button", "none"], answer: 0 },
            { question: "Which attribute is required in form?", options: ["name", "id", "class", "style"], answer: 0 },
            { question: "What is output? \n &lt;audio controls&gt;\n &lt;source src='a.mp3'&gt;\n &lt;/audio&gt;", options: ["audio player", "video", "image", "none"], answer: 0 },
            { question: "Which tag groups content?", options: ["&lt;section&gt;", "&lt;b&gt;", "&lt;i&gt;", "&lt;u&gt;"], answer: 0 },
            { question: "What is output? \n &lt;iframe src='a.html'&gt;&lt;/iframe&gt;", options: ["embed page", "image", "text", "none"], answer: 0 },
            { question: "Which tag is metadata?", options: ["&lt;meta&gt;", "&lt;div&gt;", "&lt;p&gt;", "&lt;span&gt;"], answer: 0 }
        ];

        let level = localStorage.getItem("level");

        let questions;

        if (level === "easy") {
            questions = easyQuestions;
        }
        else if (level === "medium") {
            questions = mediumQuestions;
        }
        else if (level === "hard") {
            questions = hardQuestions;
        }
        else {
            alert("Please select level first");
            window.location.href = "level.html";
        }
        let index = 0;
        let userAnswers = [];

        function loadQuestion() {
            let q = questions[index];

            $("#questionBox").fadeOut(200, function () {
                document.getElementById("qno").innerText = "Question " + (index + 1) + "/" + questions.length;
                document.getElementById("question").innerText = q.question;

                let html = "";
                for (let i = 0; i < q.options.length; i++) {
                    let checked = userAnswers[index] == i ? "checked" : "";
                    html += "<label>" +
                        "<input type='radio' name='ans' " + checked + " onclick='selectOption(" + i + ")'>" +
                        q.options[i] +
                        "</label>";
                }

                document.getElementById("options").innerHTML = html;
                $("#questionBox").fadeIn(200);
            });

            if (index == 0) {
                document.getElementById("prevButton").style.display = "none";
            } else {
                document.getElementById("prevButton").style.display = "inline-block";
            }

            if (index == questions.length - 1) {
                document.getElementById("nextButton").style.display = "none";
                document.getElementById("submitButton").style.display = "inline-block";
            } else {
                document.getElementById("nextButton").style.display = "inline-block";
                document.getElementById("submitButton").style.display = "none";
            }
        }

        function selectOption(i) {
            userAnswers[index] = i;
        }

        function next() {
            if (index < questions.length - 1) {
                index++;
                loadQuestion();
            }
        }

        function prev() {
            if (index > 0) {
                index--;
                loadQuestion();
            }
        }

        function submitQuiz() {
            stopTimer();
            let score = 0;

            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] == undefined) {
                    alert("Please answer all questions before submitting.");
                    return;
                }
            }

            for (let i = 0; i < questions.length; i++) {
                if (questions[i].answer == userAnswers[i]) {
                    score++;
                }
            }

            localStorage.setItem("score", score);
            localStorage.setItem("total", questions.length);

            let timeTaken = (5 * 60) - totalTime;
            localStorage.setItem("score", score);
            localStorage.setItem("total", questions.length);
            localStorage.setItem("timeTaken", timeTaken);

            window.location.href = "result.html";
        }

        window.onload = function () {
            document.getElementById("submitButton").style.display = "none";
            loadQuestion();
            startTimer();
        }
    </script>
</body>

</html>
